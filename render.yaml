# Render Blueprint — ABM Engine
# Deploy: push this repo to GitHub → Render → New → Blueprint → pick this repo.
# Render reads this file and provisions everything below in one shot.
#
# What it creates:
#   - abm-web      : the Next.js app (public URL)
#   - abm-worker   : the BullMQ workers (all 11 engines, one process — ADR-012)
#   - abm-postgres : managed PostgreSQL 16
#   - abm-redis    : managed Key-Value (Redis) for the event bus
#
# After first deploy, set the SECRET env vars (marked sync:false) in the Render
# dashboard — they are never committed. See docs/project/deploy-render.md.

databases:
  - name: abm-postgres
    databaseName: abm
    user: abm
    plan: basic-256mb       # bump to standard for real load
    postgresMajorVersion: "16"

services:
  # ── Redis (event bus) ──────────────────────────────────────────────────────
  - type: keyvalue
    name: abm-redis
    plan: free               # 25MB; enough for MVP queues. Bump for volume.
    maxmemoryPolicy: noeviction   # BullMQ must NOT evict jobs
    ipAllowList: []          # only reachable from inside the Render network

  # ── Web app ────────────────────────────────────────────────────────────────
  - type: web
    name: abm-web
    runtime: node
    plan: starter
    buildCommand: npm ci && npm run build
    preDeployCommand: npx prisma migrate deploy   # runs once per deploy, before traffic shifts
    startCommand: npm run start
    healthCheckPath: /api/v1/icp-engine/health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase: { name: abm-postgres, property: connectionString }
      - key: DIRECT_URL
        fromDatabase: { name: abm-postgres, property: connectionString }
      - key: REDIS_URL
        fromService: { type: keyvalue, name: abm-redis, property: connectionString }
      - key: NEXT_PUBLIC_APP_URL
        fromService: { type: web, name: abm-web, property: host }
      # secrets — set these in the dashboard (never committed)
      - { key: AUTH_SECRET,           sync: false }
      - { key: ENCRYPTION_KEY,        sync: false }
      - { key: ICP_LLM,               sync: false }   # "anthropic" in prod, or "ollama" w/ tunnel
      - { key: ANTHROPIC_API_KEY,     sync: false }
      - { key: OLLAMA_URL,            sync: false }   # only if ICP_LLM=ollama via tunnel
      - { key: OLLAMA_MODEL,          sync: false }
      - { key: APOLLO_API_KEY,        sync: false }
      - { key: FIRECRAWL_API_KEY,     sync: false }
      - { key: THEIRSTACK_API_KEY,    sync: false }
      - { key: HUBSPOT_SERVICE_KEY,   sync: false }
      - { key: TELEGRAM_BOT_TOKEN,    sync: false }
      - { key: TELEGRAM_CHAT_ID,      sync: false }
      - { key: GOOGLE_CLIENT_ID,      sync: false }
      - { key: GOOGLE_CLIENT_SECRET,  sync: false }
      - { key: NEXT_PUBLIC_POSTHOG_KEY,  sync: false }
      - { key: NEXT_PUBLIC_POSTHOG_HOST, sync: false }

  # ── Worker (event bus consumers) ───────────────────────────────────────────
  - type: worker
    name: abm-worker
    runtime: node
    plan: starter
    buildCommand: npm ci && npx prisma generate
    startCommand: npm run worker
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase: { name: abm-postgres, property: connectionString }
      - key: DIRECT_URL
        fromDatabase: { name: abm-postgres, property: connectionString }
      - key: REDIS_URL
        fromService: { type: keyvalue, name: abm-redis, property: connectionString }
      - { key: ENCRYPTION_KEY,        sync: false }
      - { key: ICP_LLM,               sync: false }
      - { key: ANTHROPIC_API_KEY,     sync: false }
      - { key: OLLAMA_URL,            sync: false }
      - { key: OLLAMA_MODEL,          sync: false }
      - { key: APOLLO_API_KEY,        sync: false }
      - { key: FIRECRAWL_API_KEY,     sync: false }
      - { key: THEIRSTACK_API_KEY,    sync: false }
      - { key: HUBSPOT_SERVICE_KEY,   sync: false }
      - { key: TELEGRAM_BOT_TOKEN,    sync: false }
      - { key: TELEGRAM_CHAT_ID,      sync: false }
