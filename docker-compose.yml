services:
  postgres:
    image: postgres:16
    container_name: abm-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: abm
      POSTGRES_PASSWORD: abm
      POSTGRES_DB: abm
    ports:
      - "5432:5432"
    volumes:
      - abm-pg-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U abm -d abm"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: abm-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - abm-redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  abm-pg-data:
  abm-redis-data:
